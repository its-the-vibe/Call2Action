# Call2Action configuration
# Copy this file to config.yaml and adjust values for your environment.
# Do NOT store sensitive information (e.g. passwords) here – use .env instead.

redis:
  # Redis server address (host:port)
  addr: "localhost:6379"
  # Redis database index
  db: 0

queue:
  # Name of the Redis list to consume incoming classification messages from
  name: "call2action:queue"

poppit:
  # Name of the Redis list that Poppit is monitoring for commands
  list: "poppit:notifications"
  # GitHub repository shown in the Poppit payload
  repo: "its-the-vibe/Call2Action"
  # Git branch shown in the Poppit payload
  branch: "refs/heads/main"
  # Default event type shown in the Poppit payload (overridable per classifier)
  type: "call2action"
  # Default working directory for executed commands (overridable per classifier)
  dir: "/tmp"

# Classifiers map a classifier_name value from the incoming message to a list
# of shell command templates.  The following placeholders are substituted with
# values from the incoming message before the commands are sent to Poppit:
#
#   {file_id}         – file_info.id
#   {file_name}       – file_info.name
#   {file_title}      – file_info.title
#   {file_mimetype}   – file_info.mimetype
#   {file_size}       – file_info.size (bytes, as integer string)
#   {original_path}   – original_path
#   {new_path}        – new_path
#   {classifier_name} – classifier_name
#   {classified_at}   – classified_at
#
# Each classifier may also override the global poppit.type and poppit.dir:
#   type     – event type sent in the Poppit payload (optional, falls back to poppit.type)
#   dir      – working directory for commands (optional, falls back to poppit.dir)
#
classifiers:
  documents:
    type: "classify-document"
    dir: "/opt/handlers/documents"
    commands:
      - "echo 'Processing document {file_name} from {original_path} to {new_path}'"
  images:
    type: "classify-image"
    dir: "/opt/handlers/images"
    commands:
      - "echo 'Resizing image {file_name}'"
      - "echo 'Converting {original_path} to {new_path}'"
